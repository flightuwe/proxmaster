services:
  proxmaster-api:
    build:
      context: ..
      dockerfile: infra/docker/proxmaster-go.Dockerfile
    image: proxmaster-go:local
    container_name: proxmaster-api
    working_dir: /app/backend
    command: ["go", "run", "./cmd/api"]
    volumes:
      - ../:/app
    environment:
      PROXMASTER_LISTEN_ADDR: "${PROXMASTER_LISTEN_ADDR:-:8080}"
      PROXMASTER_ADMIN_TOKEN: "${PROXMASTER_ADMIN_TOKEN:-dev-admin-token}"
      PROXMASTER_STORE_BACKEND: "${PROXMASTER_STORE_BACKEND:-postgres}"
      PROXMASTER_POSTGRES_DSN: "${PROXMASTER_POSTGRES_DSN:-postgres://proxmaster:proxmaster@postgres:5432/proxmaster?sslmode=disable}"
      PROXMASTER_FAIL_CLOSED: "${PROXMASTER_FAIL_CLOSED:-true}"
      PROXMASTER_RUNNER_HEARTBEAT_MAX_SEC: "${PROXMASTER_RUNNER_HEARTBEAT_MAX_SEC:-120}"
      PROXMASTER_CONTROLPLANE_MODE: "${PROXMASTER_CONTROLPLANE_MODE:-vip}"
      PROXMASTER_CONTROLPLANE_VIP: "${PROXMASTER_CONTROLPLANE_VIP:-100.100.100.10}"
      PROXMASTER_CONTROLPLANE_DNS_NAME: "${PROXMASTER_CONTROLPLANE_DNS_NAME:-proxmaster.internal}"
      PROXMASTER_CONTROLPLANE_API_PORT: "${PROXMASTER_CONTROLPLANE_API_PORT:-8080}"
      PROXMASTER_NODE_ID: "${PROXMASTER_NODE_ID:-node-1}"
      PROXMASTER_PROXMOX_USE_REAL_API: "${PROXMASTER_PROXMOX_USE_REAL_API:-false}"
      PROXMASTER_PROXMOX_API_BASE_URL: "${PROXMASTER_PROXMOX_API_BASE_URL:-https://proxmox-node1:8006/api2/json}"
      PROXMASTER_PROXMOX_API_TOKEN_ID: "${PROXMASTER_PROXMOX_API_TOKEN_ID:-}"
      PROXMASTER_PROXMOX_API_TOKEN_SECRET: "${PROXMASTER_PROXMOX_API_TOKEN_SECRET:-}"
      PROXMASTER_PROXMOX_INSECURE_TLS: "${PROXMASTER_PROXMOX_INSECURE_TLS:-false}"
      PROXMASTER_WIREGUARD_INTERFACE: "${PROXMASTER_WIREGUARD_INTERFACE:-wg0}"
      PROXMASTER_GITOPS_REPO_DIR: "${PROXMASTER_GITOPS_REPO_DIR:-/opt/proxmaster}"
      PROXMASTER_GITOPS_BRANCH: "${PROXMASTER_GITOPS_BRANCH:-main}"
      PROXMASTER_GITOPS_COMPOSE_FILE: "${PROXMASTER_GITOPS_COMPOSE_FILE:-/opt/proxmaster/infra/docker-compose.yml}"
      PROXMASTER_GITOPS_ENV_FILE: "${PROXMASTER_GITOPS_ENV_FILE:-/opt/proxmaster/infra/.env}"
      PROXMASTER_GITOPS_HEALTH_URL: "${PROXMASTER_GITOPS_HEALTH_URL:-http://127.0.0.1:8080/healthz}"
      PROXMASTER_GITOPS_ROLLBACK_ON_FAIL: "${PROXMASTER_GITOPS_ROLLBACK_ON_FAIL:-true}"
      PROXMASTER_BREAKGLASS_ENABLE_CMD: "${PROXMASTER_BREAKGLASS_ENABLE_CMD:-}"
      PROXMASTER_BREAKGLASS_DISABLE_CMD: "${PROXMASTER_BREAKGLASS_DISABLE_CMD:-}"
      PROXMASTER_BREAKGLASS_DEFAULT_MIN: "${PROXMASTER_BREAKGLASS_DEFAULT_MIN:-60}"
      PROXMASTER_WIREGUARD_CONFIG_PATH: "${PROXMASTER_WIREGUARD_CONFIG_PATH:-/etc/wireguard/wg0.conf}"
      PROXMASTER_WIREGUARD_KEYS_DIR: "${PROXMASTER_WIREGUARD_KEYS_DIR:-/etc/proxmaster/wireguard}"
      PROXMASTER_WIREGUARD_LISTEN_PORT: "${PROXMASTER_WIREGUARD_LISTEN_PORT:-51820}"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - vault

  postgres:
    image: postgres:16
    container_name: proxmaster-postgres
    environment:
      POSTGRES_USER: proxmaster
      POSTGRES_PASSWORD: proxmaster
      POSTGRES_DB: proxmaster
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: proxmaster-redis
    ports:
      - "6379:6379"

  vault:
    image: hashicorp/vault:1.16
    container_name: proxmaster-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"

  runner-agent:
    build:
      context: ..
      dockerfile: infra/docker/proxmaster-go.Dockerfile
    image: proxmaster-go:local
    container_name: proxmaster-runner-agent
    working_dir: /app/backend
    command: ["go", "run", "./cmd/runner-agent"]
    volumes:
      - ../:/app
    environment:
      RUNNER_LISTEN_ADDR: "${RUNNER_LISTEN_ADDR:-:9091}"
      RUNNER_NODE_ID: "${RUNNER_NODE_ID:-node-1}"
      RUNNER_SHARED_SECRET: "${RUNNER_SHARED_SECRET:-dev-runner-secret}"
      RUNNER_API_BASE_URL: "${RUNNER_API_BASE_URL:-http://proxmaster-api:8080}"
      RUNNER_ADMIN_TOKEN: "${RUNNER_ADMIN_TOKEN:-${PROXMASTER_ADMIN_TOKEN:-dev-admin-token}}"
      RUNNER_HEARTBEAT_NODES: "${RUNNER_HEARTBEAT_NODES:-node-1,node-2,node-3,node-4}"
      RUNNER_HEARTBEAT_INTERVAL_SEC: "${RUNNER_HEARTBEAT_INTERVAL_SEC:-30}"
    ports:
      - "9091:9091"
    depends_on:
      - proxmaster-api

volumes:
  pgdata:
