version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: proxmaster-postgres
    environment:
      POSTGRES_USER: proxmaster
      POSTGRES_PASSWORD: proxmaster
      POSTGRES_DB: proxmaster
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: proxmaster-redis
    ports:
      - "6379:6379"

  vault:
    image: hashicorp/vault:1.16
    container_name: proxmaster-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"

volumes:
  pgdata: