version: "3.9"

services:
  proxmaster-api:
    image: golang:1.22
    container_name: proxmaster-api
    working_dir: /app/backend
    command: ["go", "run", "./cmd/api"]
    volumes:
      - ../:/app
    environment:
      PROXMASTER_LISTEN_ADDR: "${PROXMASTER_LISTEN_ADDR:-:8080}"
      PROXMASTER_ADMIN_TOKEN: "${PROXMASTER_ADMIN_TOKEN:-dev-admin-token}"
      PROXMASTER_STORE_BACKEND: "${PROXMASTER_STORE_BACKEND:-postgres}"
      PROXMASTER_POSTGRES_DSN: "${PROXMASTER_POSTGRES_DSN:-postgres://proxmaster:proxmaster@postgres:5432/proxmaster?sslmode=disable}"
      PROXMASTER_FAIL_CLOSED: "${PROXMASTER_FAIL_CLOSED:-true}"
      PROXMASTER_RUNNER_HEARTBEAT_MAX_SEC: "${PROXMASTER_RUNNER_HEARTBEAT_MAX_SEC:-120}"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - vault

  postgres:
    image: postgres:16
    container_name: proxmaster-postgres
    environment:
      POSTGRES_USER: proxmaster
      POSTGRES_PASSWORD: proxmaster
      POSTGRES_DB: proxmaster
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: proxmaster-redis
    ports:
      - "6379:6379"

  vault:
    image: hashicorp/vault:1.16
    container_name: proxmaster-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"

  runner-agent:
    image: golang:1.22
    container_name: proxmaster-runner-agent
    working_dir: /app/backend
    command: ["go", "run", "./cmd/runner-agent"]
    volumes:
      - ../:/app
    environment:
      RUNNER_LISTEN_ADDR: "${RUNNER_LISTEN_ADDR:-:9091}"
      RUNNER_NODE_ID: "${RUNNER_NODE_ID:-node-1}"
      RUNNER_SHARED_SECRET: "${RUNNER_SHARED_SECRET:-dev-runner-secret}"
    ports:
      - "9091:9091"

volumes:
  pgdata:
